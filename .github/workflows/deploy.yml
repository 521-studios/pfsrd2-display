name: Deploy pfsrd2-display

on:
  push:
    branches: [main]        # → staging auto-deploy
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]

permissions:
  contents: read
  id-token: write  # OIDC

env:
  AWS_REGION: us-east-2
  NODE_VERSION: "20"
  TF_VERSION: "1.9.0"

jobs:
  # ── Staging: auto on push to main, or manual dispatch from any branch ─────────

  deploy-staging:
    name: Deploy — staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging

    env:
      TF_STATE_BUCKET: 521studios-infra-tfstate-242288027927
      S3_BUCKET: 521studios-staging-pfsrd2-display

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: pfsrd2-display-deploy-staging

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build:site

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=pfsrd2-display/staging/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve -input=false \
            -var="env=staging" \
            -var="active_sha=${{ github.sha }}"

      - name: Upload to S3
        run: |
          aws s3 sync dist-site/ "s3://${{ env.S3_BUCKET }}/${{ github.sha }}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist-site/index.html "s3://${{ env.S3_BUCKET }}/${{ github.sha }}/index.html" \
            --cache-control "no-cache"

  # ── Production: manual dispatch only ──────────────────────────────────────

  deploy-production:
    name: Deploy — production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production

    env:
      TF_STATE_BUCKET: 521studios-infra-tfstate-242258465702
      S3_BUCKET: 521studios-production-pfsrd2-display

    steps:
      - uses: actions/checkout@v4

      - name: Require main branch for production
        if: github.ref != 'refs/heads/main'
        run: |
          echo "❌ Production deploys must be triggered from the main branch (got: ${{ github.ref }})"
          exit 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: pfsrd2-display-deploy-production

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build:site

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=pfsrd2-display/production/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve -input=false \
            -var="env=production" \
            -var="active_sha=${{ github.sha }}"

      - name: Upload to S3
        run: |
          aws s3 sync dist-site/ "s3://${{ env.S3_BUCKET }}/${{ github.sha }}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist-site/index.html "s3://${{ env.S3_BUCKET }}/${{ github.sha }}/index.html" \
            --cache-control "no-cache"
